apis:
  - aid: keio:koara-oai-pmh
    name: KOARA OAI-PMH Metadata API
    description: >-
      KOARA (KeiO Associated Repository of Academic resources) is Keio
      University's institutional repository, released in 2006 and running on the
      XooNips platform. It exposes a publicly accessible OAI-PMH 2.0 endpoint for
      harvesting metadata of its scholarly records (theses, articles, and other
      academic resources). The Identify response confirms protocol version 2.0
      with second-level datestamp granularity.
    humanURL: https://koara.lib.keio.ac.jp/doc/KOARA_About_en.htm
    baseURL: https://koara.lib.keio.ac.jp/xoonips/modules/xoonips/oai.php
