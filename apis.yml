aid: keio
name: Keio University
description: >-
  Keio University is a private research university in Tokyo, Japan, founded in
  1858, and ranked #188 in the QS World University Rankings 2025. Its public
  machine-readable footprint is led by KOARA (KeiO Associated Repository of
  Academic resources), the institutional repository, which exposes a live
  OAI-PMH 2.0 metadata-harvesting endpoint. Most other institutional systems
  (keio.jp SSO over Google Workspace, Canvas K-LMS, the K-RIS researcher system,
  KOSMOS library discovery, and the Keio Object Hub culture portal) are
  account-gated and do not publish open developer API documentation. Identity is
  federated through GakuNin, the Japanese academic SAML/Shibboleth federation
  that participates in eduGAIN.
