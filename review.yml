reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      Verified live: the KOARA institutional repository serves a valid OAI-PMH
      2.0 endpoint (Identify returns protocolVersion 2.0). The main institution,
      English site, and library site all resolve. No public REST API or
      developer portal was found; keio.jp SSO (Google Workspace), Canvas K-LMS,
      K-RIS, KOSMOS, and the Keio Object Hub are account-gated with no published
      open API docs. Identity is federated via GakuNin (SAML/Shibboleth, eduGAIN).
      The github.com/keio account is an unrelated individual, not the
      institution, so it was excluded; only research-lab GitHub orgs exist. No
      endpoints were fabricated.
    endpoints:
      - url: https://koara.lib.keio.ac.jp/xoonips/modules/xoonips/oai.php?verb=Identify
        status: 200
        note: Live OAI-PMH 2.0 Identify response; baseURL and granularity confirmed.
